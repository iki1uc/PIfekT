<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>UFO Formel Check – NEU</title>
  <style>
    body {
      background: #111;
      color: #eee;
      font-family: monospace;
      padding: 40px;
    }
    .error {
      padding: 20px;
      border: 2px solid #ffcc00;
      background: #332200;
      color: #ffdd55;
      margin-top: 20px;
    }
    .ok {
      padding: 20px;
      border: 2px solid #00cc66;
      background: #002b14;
      color: #66ff99;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h1>UFO Formel Check – NEU</h1>

<script type="module">
  // NEUE mathematische UFO-Formel
  const UFO_FORMEL_NEU = "R = A × U × S + C";

  // Check-Funktion für neue Formel
  function checkUfoFormula(expr) {
    if (expr === UFO_FORMEL_NEU) {
      return {
        state: "REALIZED",
        type: "MATH-OK",
        message: "Neue UFO-Formel aktiv: R = A × U × S + C",
        critical: false
      };
    }

    return {
      state: "MISMATCH",
      type: "NO-MATCH",
      message: "Formel stimmt nicht mit der neuen UFO-Formel überein.",
      critical: true
    };
  }

  const result = checkUfoFormula(UFO_FORMEL_NEU);

  const box = document.createElement("div");
  box.className = result.critical ? "error" : "ok";
  box.innerHTML = `
    <strong>${result.type}</strong><br>
    ${result.message}<br><br>
    Zustand: ${result.state}
  `;
  document.body.appendChild(box);

  // NEUER BLOCK – Wahrheit – kein ALT
  const eis = document.createElement("div");
  eis.className = "ok";
  eis.innerHTML = `EXPERTISE‑Name: 10 = EIS ZEIT`;
  document.body.appendChild(eis);

</script>

</body>
</html>
